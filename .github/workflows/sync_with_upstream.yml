name: Sync fork with upstream

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-update-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main
      - name: Configure git identity
        run: |
          git config user.name "Nikolas Pitsillos"
          git config user.email "npitsillos@users.noreply.github.com"
      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/langchain-ai/open-swe.git
          git fetch upstream
      - name: Reset sync branch to fork's main
        run: |
          git checkout -B sync-upstream origin/main     
      - name: Merge upstream, committing conflicts if any
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "conflict=false" >> $GITHUB_OUTPUT
          else
            echo "conflict=true" >> $GITHUB_OUTPUT
            git add -A
            git commit --no-edit -m "Merge upstream/main into sync-upstream (unresolved conflicts)"
          fi
      - name: Push sync branch
        run: git push -u origin sync-upstream --force
      - name: Create or update PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: sync-upstream
          base: main
          title: ${{ steps.merge.outputs.conflict == 'true' && '⚠️ Sync with upstream (has conflicts)' || 'Sync with upstream' }}
          body: ${{ steps.merge.outputs.conflict == 'true' && 'Automated sync hit merge conflicts. Files contain conflict markers that need manual resolution before merging.' || 'Automated PR to pull in upstream changes.' }}
