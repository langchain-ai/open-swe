name: Sync fork with upstream

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-update-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: aeteq
          repositories: open-swe
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false
      - name: Configure git identity
        run: |
          git config user.name "Nikolas Pitsillos"
          git config user.email "npitsillos@users.noreply.github.com"
      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/langchain-ai/open-swe.git
          git fetch upstream
      - name: Reset sync branch to fork's main
        run: |
          git checkout -B sync-upstream origin/main     
      - name: Detect conflicting files
        id: conflicts
        run: |
          if git merge --no-commit --no-ff upstream/main 2>/dev/null; then
            echo "files=" >> $GITHUB_OUTPUT
          else
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U | sort)
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "files<<$EOF" >> $GITHUB_OUTPUT
            echo "$CONFLICT_FILES" >> $GITHUB_OUTPUT
            echo "$EOF" >> $GITHUB_OUTPUT
          fi
          git merge --abort 2>/dev/null || true
      - name: Merge upstream, keeping our version on conflicts
        id: merge
        run: |
          git merge upstream/main --no-edit -X ours
      - name: Push sync branch
        run: |
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/aeteq/open-swe.git
          git push -u origin sync-upstream --force-with-lease
      - name: Create or update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git diff --quiet main...sync-upstream; then
            echo "No upstream changes to sync."
            exit 0
          fi
          CONFLICT_FILES="${{ steps.conflicts.outputs.files }}"
          if [ -n "$CONFLICT_FILES" ]; then
            TITLE="chore: sync with upstream (conflicts auto-resolved)"
            FILE_LIST=$(echo "$CONFLICT_FILES" | sed 's/^/- `/' | sed 's/$/`/')
            BODY="Automated sync hit merge conflicts that were auto-resolved by keeping our fork's version (\`-X ours\`).

**Files where our version was kept over upstream's:**
$FILE_LIST

Review these files to check if upstream made important changes."
          else
            TITLE="chore: sync with upstream"
            BODY="Automated PR to pull in upstream changes."
          fi
          EXISTING_PR=$(gh pr list --repo aeteq/open-swe --head sync-upstream --base main --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists."
          else
            gh pr create --repo aeteq/open-swe --head sync-upstream --base main --title "$TITLE" --body "$BODY"
          fi
