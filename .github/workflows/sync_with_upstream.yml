name: Sync fork with upstream

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-update-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: aeteq
          repositories: open-swe
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false
      - name: Configure git identity
        run: |
          git config user.name "Nikolas Pitsillos"
          git config user.email "npitsillos@users.noreply.github.com"
      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/langchain-ai/open-swe.git
          git fetch upstream
      - name: Reset sync branch to fork's main
        run: |
          git checkout -B sync-upstream origin/main     
      - name: Merge upstream, committing conflicts if any
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "conflict=false" >> $GITHUB_OUTPUT
          else
            echo "conflict=true" >> $GITHUB_OUTPUT
            git add -A
            git commit --no-edit -m "Merge upstream/main into sync-upstream (unresolved conflicts)"
          fi
      - name: Push sync branch
        run: |
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/aeteq/open-swe.git
          git push -u origin sync-upstream --force-with-lease
      - name: Create or update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git diff --quiet main...sync-upstream; then
            echo "No upstream changes to sync."
            exit 0
          fi
          if [ "${{ steps.merge.outputs.conflict }}" = "true" ]; then
            TITLE="⚠️ Sync with upstream (has conflicts)"
            BODY="Automated sync hit merge conflicts. Files contain conflict markers that need manual resolution before merging."
          else
            TITLE="Sync with upstream"
            BODY="Automated PR to pull in upstream changes."
          fi
          EXISTING_PR=$(gh pr list --head sync-upstream --base main --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists."
          else
            gh pr create --head sync-upstream --base main --title "$TITLE" --body "$BODY"
          fi
