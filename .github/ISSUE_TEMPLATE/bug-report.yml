name: "\U0001F41B Bug Report"
description: Report a bug in Open SWE. For questions, please use the LangChain forum (below).
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report.

        For usage questions and general discussion, please use the [LangChain Forum](https://forum.langchain.com/).

        Check these before submitting to see if your issue has already been reported or fixed:

        * [Open SWE README](https://github.com/langchain-ai/open-swe/blob/main/README.md),
        * [GitHub search](https://github.com/langchain-ai/open-swe/issues),
        * [LangChain Forum](https://forum.langchain.com/),
  - type: checkboxes
    id: checks
    attributes:
      label: Checked other resources
      description: Please confirm and check all the following options.
      options:
        - label: This is a bug, not a usage question.
          required: true
        - label: I added a clear and descriptive title that summarizes this issue.
          required: true
        - label: I used the GitHub search to find a similar issue and didn't find it.
          required: true
  - type: textarea
    id: reproduction
    validations:
      required: true
    attributes:
      label: Reproduction Steps
      description: |
        Please describe the steps to reproduce the bug.

        If applicable, include any configuration, commands, or code snippets needed to reproduce the issue.
      placeholder: |
        1. Set up Open SWE with ...
        2. Run ...
        3. See error ...
  - type: textarea
    attributes:
      label: Error Message and Stack Trace (if applicable)
      description: |
        If you are reporting an error, please copy and paste the full error message and
        stack trace.
        (This will be automatically formatted into code, so no need for backticks.)
      render: shell
  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        What is the problem?

        Write a short description telling what you are doing, what you expect to happen, and what is currently happening.
      placeholder: |
        * I'm trying to use Open SWE to do X.
        * I expect to see Y.
        * Instead, it does Z.
    validations:
      required: true
  - type: textarea
    id: system-info
    attributes:
      label: System Info
      description: |
        Please share your system info:
        - Node.js version (`node --version`)
        - Yarn version (`yarn --version`)
        - OS and version
        - Browser (if UI related)
      placeholder: |
        Node.js: v22.x.x
        Yarn: 3.x.x
        OS: macOS 15.x / Ubuntu 24.04
        Browser: Chrome 130
    validations:
      required: true
