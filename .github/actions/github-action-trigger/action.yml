name: Open SWE Trigger
description: Trigger Open SWE from a GitHub workflow via LangGraph runs.create.

inputs:
  open_swe_url:
    description: Base URL for the Open SWE deployment.
    required: true
  open_swe_api_key:
    description: LangGraph API key for the Open SWE deployment.
    required: true
  prompt:
    description: Prompt text to send to Open SWE.
    required: true
  assistant_id:
    description: Assistant id to run (defaults to agent).
    required: false
  thread_id:
    description: Optional explicit thread id. If omitted, a UUID is generated.
    required: false
  if_not_exists:
    description: Thread behavior when thread_id does not exist (create or reject).
    required: false

outputs:
  thread_id:
    description: Open SWE thread id.
    value: ${{ steps.send.outputs.thread_id }}
  run_id:
    description: Open SWE run id.
    value: ${{ steps.send.outputs.run_id }}
  response_json:
    description: Raw JSON response as a compact string.
    value: ${{ steps.send.outputs.response_json }}

runs:
  using: composite
  steps:
    - id: send
      shell: bash
      env:
        INPUT_OPEN_SWE_URL: ${{ inputs.open_swe_url }}
        INPUT_OPEN_SWE_API_KEY: ${{ inputs.open_swe_api_key }}
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_ASSISTANT_ID: ${{ inputs.assistant_id }}
        INPUT_THREAD_ID: ${{ inputs.thread_id }}
        INPUT_IF_NOT_EXISTS: ${{ inputs.if_not_exists }}
      run: |
        set -euo pipefail

        if [ -z "${INPUT_OPEN_SWE_API_KEY:-}" ]; then
          echo "open_swe_api_key is required." >&2
          exit 1
        fi

        open_swe_url="${INPUT_OPEN_SWE_URL%/}"
        if [ -z "$open_swe_url" ]; then
          echo "open_swe_url is required." >&2
          exit 1
        fi

        thread_id="${INPUT_THREAD_ID:-}"
        if [ -z "$thread_id" ]; then
          thread_id="$(uuidgen | tr '[:upper:]' '[:lower:]')"
        fi

        assistant_id="${INPUT_ASSISTANT_ID:-agent}"
        if [ -z "$assistant_id" ]; then
          echo "assistant_id must be non-empty." >&2
          exit 1
        fi

        if_not_exists="${INPUT_IF_NOT_EXISTS:-create}"
        if [ "$if_not_exists" != "create" ] && [ "$if_not_exists" != "reject" ]; then
          echo "if_not_exists must be create or reject." >&2
          exit 1
        fi

        body="$(jq -nc \
          --arg assistant_id "$assistant_id" \
          --arg prompt "$INPUT_PROMPT" \
          --arg if_not_exists "$if_not_exists" \
          '{
            assistant_id: $assistant_id,
            input: {
              messages: [
                {
                  role: "user",
                  content: $prompt
                }
              ]
            },
            if_not_exists: $if_not_exists
          }')"

        response_file="$(mktemp)"
        http_code="$(
          curl -sS -o "$response_file" -w '%{http_code}' -X POST \
            "${open_swe_url}/threads/${thread_id}/runs" \
            -H 'Content-Type: application/json' \
            -H "x-api-key: ${INPUT_OPEN_SWE_API_KEY}" \
            -d "$body"
        )"

        if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
          echo "Open SWE runs.create call failed with HTTP $http_code" >&2
          cat "$response_file" >&2 || true
          exit 1
        fi

        response_json="$(jq -c '.' "$response_file")"
        run_id_out="$(jq -r '.run_id // .id // ""' "$response_file")"
        if [ "$run_id_out" = "null" ]; then
          run_id_out=""
        fi

        {
          echo "thread_id=$thread_id"
          echo "run_id=$run_id_out"
          echo "response_json=$response_json"
        } >> "$GITHUB_OUTPUT"
